<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to PDF</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="hero">
        <h1>HTML to PDF</h1>
        <p>Paste your HTML code and convert it into a PDF</p>
    </div>

    <div class="upload-box">
        <form method="POST" id="uploadForm">
            <textarea name="html_content" rows="12" placeholder="Paste your HTML code here..." required></textarea>

            <div id="progressContainer" style="display:none; margin-top:20px;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="loadingText">Converting HTML to PDF...</p>
            </div>

            <br>
            <button type="submit" class="nav-btn">Convert Now</button>
        </form>
    </div>

    <br>
    <a href="/" class="back-link">⬅ Back</a>

    <script src="/static/script.js"></script>
</body>
</html>
