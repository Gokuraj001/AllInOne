<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Organize PDF — ALL-IN-ONE Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v5.0.1/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">

    <style>
        /* ═══════════════════════════════════════════════════ EXACT ORIGINAL CSS ═══════════════════════════════════════════════════ */
        :root {
            --err-color: #ff4d6d;
            --tr: 0.45s cubic-bezier(0.4,0,0.2,1);
            --tr-fast: 0.25s cubic-bezier(0.4,0,0.2,1);
            --tr-spring: 0.55s cubic-bezier(0.22,1,0.36,1);
            --radius: 20px; --radius-sm: 12px; --radius-xs: 8px;
            --font-display:'Outfit', sans-serif; --font-body: 'Instrument Sans', sans-serif;
        }

        [data-theme="dark"] {
            --bg: #060610; --bg2: #0b0b1e; --bg3: #0f0f28; --surface: rgba(255,255,255,0.042);
            --surface2: rgba(255,255,255,0.07); --border: rgba(255,255,255,0.08);
            --text: #eeeef8; --text2: rgba(238,238,248,0.55); --text3: rgba(238,238,248,0.28);
            --accent: #8b72ff; --accent2: #2dd4f0; --accent3: #ff6bd6;
            --glow-a: rgba(139,114,255,0.32); --glow-b: rgba(45,212,240,0.22);
            --header-bg: rgba(6,6,16,0.65); --orb1: rgba(139,114,255,0.10);
            --orb2: rgba(45,212,240,0.08); --orb3: rgba(255,107,214,0.07);
        }

        [data-theme="light"] {
            --bg: #f2f0ff; --bg2: #ebe7ff; --surface: rgba(255,255,255,0.75);
            --border: rgba(100,80,200,0.11); --text: #1a1540; --text2: rgba(26,21,64,0.58);
            --accent: #6c4fff; --accent2: #0ea5c9; --glow-a: rgba(108,79,255,0.20);
        }

        *,::before,::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-body); background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; transition:background var(--tr);}

        /* BACKGROUND ELEMENTS */
        .bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;}
        .bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 90% 60% at 18% 0%, var(--orb1) 0%,transparent 55%),radial-gradient(ellipse 70% 50% at 88% 72%, var(--orb2) 0%,transparent 55%),radial-gradient(ellipse 55% 45% at 52% 42%, var(--orb3) 0%,transparent 60%);animation:bgBreath 14s ease-in-out infinite alternate;}
        @keyframes bgBreath{from{opacity:.75;transform:scale(1)}to{opacity:1;transform:scale(1.04)}}
        .bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse 85% 85% at 50% 50%,black 30%,transparent 100%);}

        /* HEADER */
        header{position:fixed;top:0;left:0;right:0;z-index:200;height:70px;display:flex;align-items:center;padding:0 28px;background:var(--header-bg);backdrop-filter:blur(22px);border-bottom:1px solid var(--border);animation:hdrSlide .8s var(--tr-spring) both;}
        @keyframes hdrSlide{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
        .brand{display:flex;align-items:center;gap:11px;}
        .brand-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--glow-a);}
        .brand-name{font-family:var(--font-display);font-weight:800;font-size:1.18rem;letter-spacing:.08em;background:linear-gradient(110deg,var(--text) 30%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

        /* ADVANCED TOOLBAR */
        .tool-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; animation: fadeUp .8s .5s var(--tr-spring) both; }
        .tool-btn { padding: 10px 18px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); color: var(--text2); font-family: var(--font-display); font-weight: 600; font-size: 0.82rem; cursor: pointer; transition: all var(--tr-fast); display: flex; align-items: center; gap: 8px; }
        .tool-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); transform: translateY(-2px); }
        .tool-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; box-shadow: 0 4px 15px var(--glow-a); }

        /* ORGANIZER VIEW */
        #organizeView { display: none; margin-top: 30px; animation: fadeUp .8s .6s var(--tr-spring) both; position: relative; z-index: 10; }
        .page-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; padding: 25px; background: rgba(255,255,255,0.02); border-radius: var(--radius); border: 1px solid var(--border); min-height: 400px; }

        .page-card { position: relative; background: #fff; border-radius: var(--radius-sm); padding: 12px; cursor: grab; transition: all var(--tr-fast); border: 2px solid transparent; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .page-card.selected { border-color: var(--accent2); box-shadow: 0 0 20px var(--accent2); }
        .page-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .page-card canvas { width: 100%; height: auto; border-radius: 4px; display: block; }

        .page-index { position: absolute; top: -12px; left: -12px; background: var(--accent); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; font-size: 12px; border: 3px solid var(--bg); z-index: 5; }

        /* ACTION OVERLAYS */
        .page-actions { position: absolute; inset: 0; background: rgba(0,0,0,0.6); border-radius: inherit; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; opacity: 0; transition: opacity 0.3s; padding: 15px; }
        .page-card:hover .page-actions { opacity: 1; }
        .action-ico { width: 34px; height: 34px; border-radius: 10px; background: var(--bg2); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .action-ico:hover { background: var(--accent); transform: scale(1.1); }
        .action-ico.del:hover { background: var(--err-color); }

        /* HERO & DROP ZONE */
        .hero{position:relative;z-index:1;padding:152px 24px 40px;text-align:center;}
        .hero h1{font-family:var(--font-display);font-weight:900;font-size:clamp(2.4rem,6.5vw,5rem);animation:fadeUp .9s .38s var(--tr-spring) both;}
        .upload-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;backdrop-filter:blur(18px);box-shadow:0 4px 30px rgba(0,0,0,0.5);max-width:1200px;margin:0 auto;position:relative;z-index:1;}
        .drop-area{border:2px dashed var(--border); padding:60px; border-radius:var(--radius-sm); text-align:center; cursor:pointer; transition:all .3s;}

        /* MODALS (CROP & EDIT) */
        .modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; max-width: 800px; width: 90%; }
        #editCanvas { max-width: 100%; border: 1px solid var(--border); }

        .float-mode{position:fixed;bottom:30px;right:28px;z-index:300;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 28px var(--glow-a);cursor:pointer;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}


/* ═══════════════════════════════════════════════════
BACK LINK
═══════════════════════════════════════════════════ */
.back-wrap{
  display:flex;justify-content:center;
  position:relative;z-index:1;margin:8px 0 90px;
  animation:fadeUp .8s .78s var(--tr-spring) both;
}
.back-link{
  display:inline-flex;align-items:center;gap:8px;padding:11px 24px;
  border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);
  backdrop-filter:blur(10px);
  font-family:var(--font-display);font-weight:600;font-size:.9rem;color:var(--text2);
  transition:color var(--tr-fast),border-color var(--tr-fast),background var(--tr-fast),transform var(--tr-fast),box-shadow var(--tr-fast);
}
.back-link:hover{color:var(--text);border-color:var(--accent);background:var(--surface2);transform:translateX(-5px);box-shadow:0 4px 20px var(--glow-a)}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="bg-layer">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
    </div>
    <canvas id="px" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>

    <header>
        <div class="brand">
            <div class="brand-icon">✨</div>
            <span class="brand-name">ALL-IN-ONE</span>
        </div>
        <div style="margin-left:auto; display:flex; gap:10px;">
            <button class="tool-btn" id="langBtn">🌍 EN</button>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>Organize PDF Pro</h1>
            <p>Visual reordering, Cropping, OCR, and Bulk Actions.</p>
        </div>

        <div class="upload-box">
            <div class="upload-card">
                <div class="tool-bar">
                    <button class="tool-btn" onclick="addBlank()">➕ Blank Page</button>
                    <button class="tool-btn" onclick="triggerMulti()">📂 Add PDFs</button>
                    <button class="tool-btn" onclick="autoSort('name')">🔤 Sort A-Z</button>
                    <button class="tool-btn" onclick="mixDocs()">🔀 Intercalate (Mix)</button>
                    <button class="tool-btn" onclick="selectAllPages()">✅ Select All</button>
                    <button class="tool-btn" onclick="deselectAllPages()">❎ Deselect All</button>
                    <button class="tool-btn" onclick="clearAllPages()">🧹 Clear All</button>
                    <button class="tool-btn" onclick="bulkRotate()">🔄 Bulk Rotate</button>
                    <button class="tool-btn" onclick="bulkDelete()" style="color:var(--err-color)">🗑️ Bulk Delete</button>
                    <button class="tool-btn primary" onclick="exportFinal()">✂️ Download Final</button>
                </div>

                <label for="pdfIn" class="drop-area" id="dropZone">
                    <div style="font-size:3.5rem; margin-bottom:15px;">📥</div>
                    <p>Drag multiple PDFs here to begin your workflow</p>
                    <input type="file" id="pdfIn" multiple accept=".pdf" hidden />
                </label>

                <div id="organizeView">
                    <div id="pageGrid" class="page-grid"></div>
                </div>
            </div>
        </div>
        <div class="back-wrap">
            <a href="/" class="back-link" data-i18n="backBtn">⬅ Back to All Tools</a>
        </div>
    </main>

    <div class="modal-overlay" id="toolModal">
        <div class="modal-box">
            <h3 style="margin-bottom:20px; font-family:var(--font-display);">Page Editor</h3>
            <div id="modalContent" style="max-height:60vh; overflow:hidden;"></div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="tool-btn primary" onclick="saveModalChanges()">Save Changes</button>
                <button class="tool-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="float-mode" onclick="toggleMode()">🌙</div>

    <script>


        
        const pdfjsLib = window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let isDark = true;
        let pageState = []; // [{id, canvas, name, rotation, selected}]
        let currentEditId = null;
        let cropper = null;
        let sortableInstance = null;

        const pageGrid = document.getElementById('pageGrid');
        const organizeView = document.getElementById('organizeView');
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--accent)';
            dropZone.style.background = 'rgba(139,114,255,0.08)';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = 'transparent';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = 'transparent';

            const files = [...e.dataTransfer.files].filter(file => file.type === 'application/pdf');
            if (files.length) handleFiles(files);
            else alert("Only PDF files are allowed.");
        });
        
        const pdfIn = document.getElementById('pdfIn');

        // MULTI-UPLOAD & CLOUD LOGIC
        pdfIn.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(files) {
            if (!files.length) return;

            document.getElementById('loadingOverlay').style.display = 'flex';
            dropZone.style.display = 'none';
            organizeView.style.display = 'block';

            try {
                for (const file of files) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const viewport = page.getViewport({ scale: 0.6 });

                            const canvas = document.createElement('canvas');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;

                            await page.render({
                                canvasContext: canvas.getContext('2d'),
                                viewport
                            }).promise;

                            pageState.push({
                                id: crypto.randomUUID(),
                                canvas: canvas,
                                name: file.name,
                                pageNum: i,
                                rotation: 0,
                                selected: false
                            });
                        }
                    }

                    renderGrid();

                } catch (err) {
                    console.error(err);
                    alert("Error while processing PDF.");
                } finally {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            }

        function renderGrid() {
            pageGrid.innerHTML = '';
            pageState.forEach((page, index) => {
                const card = document.createElement('div');
                card.className = `page-card ${page.selected ? 'selected' : ''}`;
                card.innerHTML = `
                    <div class="page-index">${index + 1}</div>
                    <div class="page-actions">
                        <div class="action-ico" onclick="rotatePage('${page.id}')">🔄</div>
                        <div class="action-ico" onclick="openCrop('${page.id}')">✂️</div>
                        <div class="action-ico" onclick="openEdit('${page.id}')">📝</div>
                        <div class="action-ico" onclick="doOCR('${page.id}')">🔍</div>
                        <div class="action-ico del" onclick="deletePage('${page.id}')">🗑️</div>
                    </div>
                `;
                
                card.addEventListener('click', (e) => {
                    if (
                        e.target.closest('.page-actions') ||
                        e.target.closest('.action-ico')
                    ) return;

                    page.selected = !page.selected;
                    renderGrid();
                });

                const thumb = document.createElement('canvas');
                const angle = page.rotation || 0;
                const radians = angle * Math.PI / 180;

                const originalWidth = page.canvas.width;
                const originalHeight = page.canvas.height;

                if (angle === 90 || angle === 270) {
                    thumb.width = originalHeight;
                    thumb.height = originalWidth;
                } else {
                    thumb.width = originalWidth;
                    thumb.height = originalHeight;
                }

                const ctx = thumb.getContext('2d');
                ctx.translate(thumb.width / 2, thumb.height / 2);
                ctx.rotate(radians);
                ctx.drawImage(page.canvas, -originalWidth / 2, -originalHeight / 2);
                
                card.appendChild(thumb);
                pageGrid.appendChild(card);
            });


                
        }


        function initSortable() {
                if (sortableInstance) {
                    sortableInstance.destroy();
                }

                sortableInstance = new Sortable(pageGrid, {
                    animation: 200,
                    ghostClass: 'sortable-ghost',
                    onEnd: (evt) => {
                        const item = pageState.splice(evt.oldIndex, 1)[0];
                        pageState.splice(evt.newIndex, 0, item);
                        renderGrid();
                    }
                });
}       
initSortable();


        // Rotate Logic
        function rotatePage(id) {
            const index = pageState.findIndex(p => p.id === id);
            if (index !== -1) {
                // Increment rotation by 90 degrees
                pageState[index].rotation = (pageState[index].rotation + 90) % 360;
                renderGrid(); // This is the "Magic" - it redraws everything with the new angle
            }
}

        // Delete Logic
        function deletePage(id) {
            pageState = pageState.filter(p => p.id !== id);
            renderGrid(); // Redraws the grid without the deleted page
}

        // FEATURE: BULK ACTIONS
        function bulkDelete() {
            pageState = pageState.filter(p => !p.selected);
            renderGrid();
        }

        function bulkRotate() {
            pageState.forEach(p => {
                if(p.selected) p.rotation = (p.rotation + 90) % 360; 
            });
            renderGrid();
        }

        // FEATURE: CROP
        function openCrop(id) {
            currentEditId = id;
            const page = pageState.find(p => p.id === id);
            const img = document.createElement('img');
            img.src = page.canvas.toDataURL();
            img.id = "cropImage";
            document.getElementById('modalContent').innerHTML = '';
            document.getElementById('modalContent').appendChild(img);
            document.getElementById('toolModal').style.display = 'flex';
            cropper = new Cropper(img, { aspectRatio: NaN });
        }

        // FEATURE: REAL-TIME EDIT (TEXT/IMAGES)
        function openEdit(id) {
            currentEditId = id;
            const page = pageState.find(p => p.id === id);
            document.getElementById('modalContent').innerHTML = `<canvas id="fabricCanvas"></canvas>`;
            document.getElementById('toolModal').style.display = 'flex';
            
            const fCanvas = new fabric.Canvas('fabricCanvas', {
                width: page.canvas.width,
                height: page.canvas.height
            });

            fabric.Image.fromURL(page.canvas.toDataURL(), (img) => {
                fCanvas.setBackgroundImage(img, fCanvas.renderAll.bind(fCanvas));
                const text = new fabric.IText('Click to Edit Text', { left: 50, top: 50, fontFamily: 'Outfit', fill: '#000' });
                fCanvas.add(text);
            });
            window.activeFCanvas = fCanvas;
        }

        function saveModalChanges() {
            const page = pageState.find(p => p.id === currentEditId);
            if(cropper) {
                const croppedCanvas = cropper.getCroppedCanvas();
                page.canvas = croppedCanvas;
                cropper.destroy(); cropper = null;
            } else if(window.activeFCanvas) {
                const editedCanvas = window.activeFCanvas.lowerCanvasEl;
                const newCanvas = document.createElement('canvas');
                newCanvas.width = editedCanvas.width; newCanvas.height = editedCanvas.height;
                newCanvas.getContext('2d').drawImage(editedCanvas, 0,0);
                page.canvas = newCanvas;
                window.activeFCanvas = null;
            }
            closeModal();
            renderGrid();
        }

        // FEATURE: INTERCALATE (MIX PDFS)
        function mixDocs() {
            const docs = [...new Set(pageState.map(p => p.name))];
            if(docs.length < 2) { alert("Upload at least 2 PDFs to mix."); return; }
            const mixed = [];
            let max = Math.max(...docs.map(d => pageState.filter(p => p.name === d).length));
            for(let i=1; i<=max; i++) {
                docs.forEach(d => {
                    const p = pageState.find(p => p.name === d && p.pageNum === i);
                    if(p) mixed.push(p);
                });
            }
            pageState = mixed;
            renderGrid();
        }

        function closeModal() {
            document.getElementById('toolModal').style.display = 'none';
            document.getElementById('modalContent').innerHTML = '';

            if (cropper) {
                cropper.destroy();
                cropper = null;
            }

            if (window.activeFCanvas) {
                window.activeFCanvas.dispose();
                window.activeFCanvas = null;
            }

            currentEditId = null;
        }


        function addBlank() {
            const c = document.createElement('canvas');
            c.width = 500; c.height = 700;
            const ctx = c.getContext('2d'); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,500,700);
            pageState.push({ id: crypto.randomUUID(), canvas: c, name: 'Blank', pageNum: 0, rotation: 0, selected: false });
            renderGrid();
        }
        function triggerMulti() { pdfIn.click(); }


        // UI: PARTICLES & THEME
        (function(){
            const c=document.getElementById('px'), ctx=c.getContext('2d');
            let W,H;
            const res=()=>{W=c.width=innerWidth; H=c.height=innerHeight;};
            window.onresize=res; res();
            const pts = Array.from({length:60},()=>({x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3, r:Math.random()*2}));
            function draw(){
                ctx.clearRect(0,0,W,H);
                ctx.fillStyle = isDark ? "rgba(139,114,255,0.2)" : "rgba(108,79,255,0.1)";
                pts.forEach(p=>{
                    p.x+=p.vx; p.y+=p.vy;
                    if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        function toggleMode() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.querySelector('.float-mode').textContent = isDark ? '🌙' : '☀️';
        }

        function autoSort(mode) {
    if (mode === 'name') {
        pageState.sort((a, b) => {
            if (a.name === b.name) return a.pageNum - b.pageNum;
            return a.name.localeCompare(b.name);
        });
    }
    renderGrid();
}

function selectAllPages() {
    pageState.forEach(p => p.selected = true);
    renderGrid();
}

function deselectAllPages() {
    pageState.forEach(p => p.selected = false);
    renderGrid();
}

function clearAllPages() {
    if (!confirm("Clear all loaded pages?")) return;
    pageState = [];
    pageGrid.innerHTML = '';
    organizeView.style.display = 'none';
    dropZone.style.display = 'block';
}

async function doOCR(id) {
    const page = pageState.find(p => p.id === id);
    if (!page) return;

    try {
        alert("OCR started. This may take a few seconds...");
        const result = await Tesseract.recognize(page.canvas.toDataURL(), 'eng');
        alert("OCR Result:\n\n" + result.data.text.substring(0, 1500));
    } catch (err) {
        console.error(err);
        alert("OCR failed.");
    }
}

async function exportFinal() {
    if (!pageState.length) {
        alert("No pages to export.");
        return;
    }

    const { jsPDF } = window.jspdf;
    let pdf = null;

    for (let i = 0; i < pageState.length; i++) {
        const page = pageState[i];

        const rotatedCanvas = document.createElement('canvas');
        const ctx = rotatedCanvas.getContext('2d');

        const angle = page.rotation || 0;
        const radians = angle * Math.PI / 180;

        const originalWidth = page.canvas.width;
        const originalHeight = page.canvas.height;

        if (angle === 90 || angle === 270) {
            rotatedCanvas.width = originalHeight;
            rotatedCanvas.height = originalWidth;
        } else {
            rotatedCanvas.width = originalWidth;
            rotatedCanvas.height = originalHeight;
        }

        ctx.translate(rotatedCanvas.width / 2, rotatedCanvas.height / 2);
        ctx.rotate(radians);
        ctx.drawImage(page.canvas, -originalWidth / 2, -originalHeight / 2);

        const imgData = rotatedCanvas.toDataURL('image/jpeg', 1.0);
        const pdfWidth = rotatedCanvas.width * 0.264583;   // px → mm
        const pdfHeight = rotatedCanvas.height * 0.264583;

        if (i === 0) {
            pdf = new jsPDF({
                orientation: pdfWidth > pdfHeight ? 'landscape' : 'portrait',
                unit: 'mm',
                format: [pdfWidth, pdfHeight]
            });
        } else {
            pdf.addPage([pdfWidth, pdfHeight], pdfWidth > pdfHeight ? 'landscape' : 'portrait');
        }

        pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
    }

    pdf.save('organized_final.pdf');
}
