<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG to PDF</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="hero">
        <h1>JPG to PDF</h1>
        <p>Convert your JPG or PNG images into one PDF</p>
    </div>

    <div class="upload-box">
        <form method="POST" enctype="multipart/form-data" id="uploadForm">
            <label for="images" class="drop-area" id="dropArea">
                <p>🖼️ Drag & Drop images here</p>
                <p>or click to browse</p>
                <input type="file" name="images" id="images" accept=".jpg,.jpeg,.png,image/*" multiple required hidden>
            </label>

            <div id="filePreview"></div>

            <small style="display:block; margin-top:8px; color:#cbd5e1;">
                You can upload multiple images.
            </small>

            <div id="progressContainer" style="display:none; margin-top:20px;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="loadingText">Converting images to PDF...</p>
            </div>

            <br>
            <button type="submit" class="nav-btn">Convert Now</button>
        </form>
    </div>

    <br>
    <a href="/" class="back-link">⬅ Back</a>

    <script src="/static/script.js"></script>
</body>
</html>
